name: Tests

permissions:
  contents: read

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: apps/manager
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e ../../sdk

      - name: Compile Python sources
        working-directory: apps/manager
        run: |
          python -m py_compile client_manager.py
          python -m compileall -q classes utils

      - name: Run smoke test (with WebSocket client)
        working-directory: apps/manager
        env:
          PYTHONPATH: .
        run: |
          python tests/smoke_runtime.py --with-ws-client

      - name: Run regression tests
        working-directory: apps/manager
        env:
          PYTHONPATH: .
        run: |
          python -m unittest tests.test_regression -v

      - name: Run pytest suite with coverage
        working-directory: apps/manager
        env:
          PYTHONPATH: .
        run: |
          python -m pytest tests/ -v \
            --cov=classes --cov=utils --cov=client_manager \
            --cov-report=xml --cov-report=term-missing

  sdk-remote-contract:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install manager dependencies
        working-directory: apps/manager
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start dev server
        working-directory: apps/manager
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          python dev_server.py &
          sleep 10

      - name: Install SDK from TestPyPI
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            --index-url https://test.pypi.org/simple/ \
            --extra-index-url https://pypi.org/simple \
            tcm-client

      - name: Run SDK quickstart against dev server
        run: |
          python - << 'EOF'
          import asyncio
          from tcm_client.sdk import quickstart_queue_stats

          async def main() -> None:
              result = await quickstart_queue_stats("ws://127.0.0.1:8000/ws")
              assert result.get("type") == "info_response", result
              payload = result.get("payload") or {}
              assert payload.get("status") == "success", payload

          asyncio.run(main())
          EOF

