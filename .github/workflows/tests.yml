name: Tests

permissions:
  contents: read

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: apps/manager
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-test.txt

      - name: Compile Python sources
        working-directory: apps/manager
        run: |
          python -m py_compile client_manager.py
          python -m compileall -q classes utils

      - name: Run smoke test (with WebSocket client)
        working-directory: apps/manager
        env:
          PYTHONPATH: .
        run: |
          python tests/smoke_runtime.py --with-ws-client

      - name: Run regression tests
        working-directory: apps/manager
        env:
          PYTHONPATH: .
        run: |
          python -m unittest tests.test_regression -v

      - name: Run pytest suite with coverage
        working-directory: apps/manager
        env:
          PYTHONPATH: .
        run: |
          pytest tests/ -v \
            --cov=classes --cov=utils --cov=client_manager \
            --cov-report=xml --cov-report=term-missing

