name: Lint

permissions:
  contents: read

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Verify repository standard
        run: |
          chmod +x scripts/verify-repo-standard.sh
          ./scripts/verify-repo-standard.sh

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: apps/manager
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Static checks (compile)
        working-directory: apps/manager
        run: |
          python -m py_compile client_manager.py
          python -m compileall -q classes utils

      - name: Lint and format (ruff + black)
        working-directory: apps/manager
        run: |
          ruff check .
          black --check .

