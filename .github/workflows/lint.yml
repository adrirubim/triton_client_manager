name: Lint

permissions:
  contents: read

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Verify repository standard
        run: |
          chmod +x scripts/verify-repo-standard.sh
          ./scripts/verify-repo-standard.sh

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Lint gate (via scripts/check.sh)
        run: |
          bash scripts/check.sh
        env:
          CHECK_SECURITY: "0"
          CHECK_TESTS: "0"

