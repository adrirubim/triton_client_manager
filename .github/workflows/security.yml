name: Security

permissions:
  contents: read

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main

jobs:
  security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Verify repository standard
        run: |
          chmod +x scripts/verify-repo-standard.sh
          ./scripts/verify-repo-standard.sh

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Security gate (via scripts/check.sh + docker_controller audit)
        run: |
          # apps/manager security (Bandit + pip-audit) via shared script
          bash scripts/check.sh

          # apps/docker_controller dependency audit (CI policy)
          python -m pip install --upgrade pip
          python -m pip install pip-audit
          pip-audit -r apps/docker_controller/requirements.txt --ignore-vuln CVE-2026-28500
        env:
          CHECK_LINT: "0"
          CHECK_COMPILE: "0"
          CHECK_TESTS: "0"

