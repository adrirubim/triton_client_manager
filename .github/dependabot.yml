# Dependabot version updates
# https://docs.github.com/es/code-security/how-tos/secure-your-supply-chain/secure-your-dependencies/configuring-dependabot-version-updates

version: 2
updates:
  # Python (pip)
  - package-ecosystem: "pip"
    directory: "/apps/manager"
    schedule:
      interval: "weekly"

  # Python (pip) - docker controller helper
  - package-ecosystem: "pip"
    directory: "/apps/docker_controller"
    schedule:
      interval: "weekly"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

