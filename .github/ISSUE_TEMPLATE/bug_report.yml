name: Bug report
description: Report a reproducible bug.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.

        **Security note:** If this is a security issue, do not open a public issue. Follow `SECURITY.md`.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect to happen, and what happened instead?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Provide minimal, exact steps to reproduce the problem.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / stack traces
      description: Paste relevant logs. **Redact secrets** (tokens, keys, credentials).
      render: bash
    validations:
      required: false
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS, Python version, Docker/OpenStack/Triton versions, config notes.
      placeholder: |
        - OS:
        - Python:
        - Docker:
        - Notes:
    validations:
      required: true

