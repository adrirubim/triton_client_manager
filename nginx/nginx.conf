worker_processes  1;

events {
    worker_connections 1024;
}

http {
    upstream tcm_managers {
        server tcm-manager-1:8000;
        server tcm-manager-2:8000;
    }

    server {
        listen 8000;

        location / {
            proxy_pass http://tcm_managers;

            # WebSocket headers
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;

            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
    }
}

events {}

http {
  upstream tcm_backend {
    server manager1:8000;
    server manager2:8000;
  }

  server {
    listen 8000;

    location / {
      proxy_pass http://tcm_backend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
    }
  }
}

