apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: triton-client-manager
  labels:
    app: triton-client-manager
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: triton-client-manager
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

