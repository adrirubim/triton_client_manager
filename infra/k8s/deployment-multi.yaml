apiVersion: apps/v1
kind: Deployment
metadata:
  name: triton-client-manager
  labels:
    app: triton-client-manager
spec:
  replicas: 2
  selector:
    matchLabels:
      app: triton-client-manager
  template:
    metadata:
      labels:
        app: triton-client-manager
    spec:
      containers:
        - name: manager
          # NOTE: Replace TCM_IMAGE_TAG with a concrete image tag at deploy time.
          image: ghcr.io/triton-client-manager/triton-client-manager:${TCM_IMAGE_TAG}
          imagePullPolicy: IfNotPresent
          env:
            - name: TCM_ENV
              value: "production"
          ports:
            - name: http
              containerPort: 8000
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"

