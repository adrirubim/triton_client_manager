services:
  prometheus:
    # NOTE: Replace <version> with a concrete image tag.
    image: prom/prometheus:v3.10.0
    container_name: tcm-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    # NOTE: Replace <version> with a concrete image tag.
    image: grafana/grafana:13.0.1
    container_name: tcm-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    # NOTE: Do NOT set insecure defaults here.
    # For local development, use `docker-compose.dev.yml` (see alongside).
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER:?set GF_SECURITY_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:?set GF_SECURITY_ADMIN_PASSWORD}
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"

