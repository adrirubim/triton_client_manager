version: "3.9"

services:
  prometheus:
    image: prom/prometheus:<version>
    container_name: tcm-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:<version>
    container_name: tcm-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    # NOTE: These credentials are for **local development only**.
    # For any shared/staging/production environment, override them via
    # environment variables or secrets and never use admin/admin.
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"

