global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: "triton-client-manager"
    static_configs:
      - targets:
          # Default target when running `apps/manager/dev_server.py` on the host.
          # On Linux without `host.docker.internal`, replace this with the host IP.
          - "host.docker.internal:8000"

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "triton-client-manager"
    scrape_interval: 15s
    metrics_path: /metrics
    static_configs:
      - targets:
          # Assumes the manager is running on the host on port 8000.
          # On Docker Desktop / WSL, host.docker.internal resolves to the host.
          - "host.docker.internal:8000"
