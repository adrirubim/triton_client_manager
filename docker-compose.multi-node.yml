version: "3.9"

services:
  tcm-manager-1:
    image: ghcr.io/triton-client-manager/triton-client-manager:latest
    container_name: tcm-manager-1
    environment:
      - TCM_ENV=production
    ports:
      - "8001:8000"

  tcm-manager-2:
    image: ghcr.io/triton-client-manager/triton-client-manager:latest
    container_name: tcm-manager-2
    environment:
      - TCM_ENV=production
    ports:
      - "8002:8000"

  nginx:
    image: nginx:alpine
    container_name: tcm-nginx-lb
    depends_on:
      - tcm-manager-1
      - tcm-manager-2
    ports:
      - "8000:8000"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro


