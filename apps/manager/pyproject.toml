[tool.ruff]
target-version = "py312"
line-length = 120
exclude = [".venv", "__pycache__", "*.egg-info"]

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W"]
ignore = ["E501", "N818"]

[tool.ruff.format]
quote-style = "double"

[tool.ruff.lint.per-file-ignores]
"classes/*/__init__.py" = ["F401", "F403"]
"classes/**/info/data/__init__.py" = ["F401"]
"classes/**/info/info.py" = ["E402"]
"classes/**/openstackthread.py" = ["E402"]
"classes/**/tritonthread.py" = ["E402"]
