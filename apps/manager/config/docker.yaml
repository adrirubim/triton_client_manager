refresh_time: 10
registry_timeout: 10
registry_endpoint: http://localhost:5000
registry_image_types: [tritonserver]
registry_address: localhost:5000
remote_api_timeout: 5
remote_api_port: 2376

# Docker Remote API transport
# - Dev/local often uses insecure HTTP on private networks.
# - Staging/production should use HTTPS with TLS verification + (ideally) mTLS.
remote_api_scheme: http
remote_api_tls_verify: true
# Optional TLS material (paths on the manager host):
# remote_api_ca_cert_path: /etc/docker/certs/ca.pem
# remote_api_client_cert_path: /etc/docker/certs/client-cert.pem
# remote_api_client_key_path: /etc/docker/certs/client-key.pem
