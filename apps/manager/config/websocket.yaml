##
## DEPRECATED (dev default)
##
## Este fichero se mantiene por compatibilidad.
## Para desarrollo usa: `config/websocket.dev.yaml`
## Para staging/producción usa: `config/websocket.prod.yaml`
##
## Nota: el runtime ya hace fail-fast en staging/production si la auth es insegura,
## pero separar ficheros reduce errores humanos.
##

# Dev defaults (equivalente a websocket.dev.yaml)
host: "0.0.0.0"
port: 8000
valid_types:
  - "auth"
  - "info"
  - "management"
  - "inference"
max_message_bytes: 65536

auth:
  mode: "simple"
  require_token: false
  required_claims: []
  issuer:
  audience:
  leeway_seconds: 60
  jwks_url:
  public_key_pem:
  algorithms: []

rate_limits:
  messages_per_second_per_client: 0
  auth_failures_per_minute_per_client: 0
