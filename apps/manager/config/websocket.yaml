host: "0.0.0.0"
port: 8000
valid_types:
  - "auth"
  - "info"
  - "management"
  - "inference"
max_message_bytes: 65536

# Optional auth hardening configuration.
# - mode: "simple"  -> no token claims enforced (default for dev/tests)
# - mode: "strict"  -> token required and validated according to claims below
auth:
  mode: "simple"
  require_token: false
  required_claims: []
  issuer:
  audience:
  leeway_seconds: 60
  # Optional JWT verification settings (used in strict mode):
  # - jwks_url: URL of a JWKS endpoint for RSA/ECDSA keys.
  # - public_key_pem: PEM-encoded public key (or shared secret for HS* in dev).
  # - algorithms: list of allowed algorithms (e.g. ["RS256", "ES256"]).
  jwks_url:
  public_key_pem:
  algorithms: []

# Optional per-client rate limiting (lightweight, in-memory).
# Set to 0 to disable each limit.
rate_limits:
  messages_per_second_per_client: 0
  auth_failures_per_minute_per_client: 0
