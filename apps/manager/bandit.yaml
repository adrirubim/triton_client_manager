## Bandit configuration for apps/manager
#
# Goal: scan application code only (not virtualenvs / deps / tests).
#
# CI currently runs Bandit against a curated set of paths, but local runs often
# use `bandit -r .` inside apps/manager, which would otherwise include
# `.venv/` and third-party packages.
exclude_dirs:
  - ".venv"
  - "tests"
  - "__pycache__"

# The manager intentionally uses best-effort cleanup patterns during shutdown and
# resource teardown. In these paths, `try/except: pass` is used to avoid masking
# the primary failure cause and to keep termination deterministic.
#
# We ignore Bandit's B110 ("try_except_pass") to prevent false positives for
# this operational hardening style.
skips:
  - B110

